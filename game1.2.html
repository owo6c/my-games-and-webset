<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game 1.2</title>
    <script>
        let obstacles = [];
        let spawnTiming = 2000; // Adjusted spawn timing in milliseconds

        function spawnObstacle() {
            // Code to spawn obstacles
            const obstacle = { position: Math.random() * window.innerWidth }; // Example obstacle
            obstacles.push(obstacle);
            // Other logic for obstacle spawning
        }

        function startGame() {
            setInterval(spawnObstacle, spawnTiming);
        }
    </script>
</head>
<body onload="startGame()">
    <h1>Welcome to Game 1.2</h1>
    <!-- Game content here -->
</body>
</html>
